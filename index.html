<!DOCTYPE html>
<html>
<head>
    <title>My Pinky World 🎀</title>
    <style>
     body {
         /* Background Pink Muda banget, biar adem */
         background-color: #FFF0F5;
         text-align: center;
         /* Font yang agak bulat dan lucu */
         font-family: 'Comic Sans MS', 'Courier New', sans-serif;
         color: #4A4A4A;
         margin-top: 50px;
     }
      
     .container {
        /* Kotak putih di tengah */
        background-color: white;
        width: 80%;
        max-width: 400px;
        margin: 0 auto;
        padding: 30px;
        /* Sudut kotak dibikin bulan (imut) */
        border-radius: 25px rgba(255, 182, 193, 0.5);
        /* Garis pinggir pink */
        border: 3px solid #FFB6C1;
     }
      
      h1 {
           /* Judul warna Pink Tua (Hot Pink) */
           color: #FF1493;
           font-size: 32px;
           margin-bottom: 10px;
      }
      
      p {
          font-size: 18px;
          line-height: 1.6;
      }

      .emoji {
          font-size: 50px;
          margin-bottom: 20px;
          display: block;
      }

      /* Hiasan Bintang kecil */
      .sparkle {
          color: #FFD700;
      }
  </style>
</head>
<body>

    <div class="container">
         <span class="emoji">🌸🩰🎀
         <h1>Hello, Cutie! <span class="sparkle'>✨</span></h1>
         <p>Welcome to my beautiful pink world.</p>
         <p>This website is made with lots of love and soft aesthetics.</p>
         <p>Have a lovely day! 💕</p>
         <hr style="border: 1px solid #FFB6C1; margin: 20px 0;">
         <p style="font-size: 14px; color: #888;">#Aesthetic #Pinky #ProgrammerGirl</p>
     </div>

</body>
</html>
